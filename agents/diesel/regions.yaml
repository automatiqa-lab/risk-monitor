# Region definitions for European Diesel Risks agent
# Focused on 4 key European markets: Germany, Spain, Italy, UK

regions:
  germany:
    display_name: "Germany"
    countries: ["Germany"]
    ports: ["Hamburg", "Bremen", "Bremerhaven"]
    keywords:
      - "Bundeskartellamt"
      - "German diesel"
      - "Autobahn"
      - "German trucking"
      - "Germany fuel"

  spain:
    display_name: "Spain"
    countries: ["Spain"]
    ports: ["Valencia", "Barcelona", "Algeciras"]
    keywords:
      - "Spanish diesel"
      - "Spain fuel"
      - "Spain trucking"
      - "Spanish transport"

  italy:
    display_name: "Italy"
    countries: ["Italy"]
    ports: ["Genoa", "Trieste", "La Spezia", "Livorno"]
    keywords:
      - "Italian diesel"
      - "Italy fuel tax"
      - "Autostrada"
      - "Italy trucking"

  united_kingdom:
    display_name: "United Kingdom"
    countries: ["United Kingdom", "UK", "Britain", "England", "Scotland", "Wales"]
    ports: ["Felixstowe", "Southampton", "London Gateway", "Liverpool", "Tilbury"]
    keywords:
      - "UK diesel"
      - "British fuel"
      - "UK fuel duty"
      - "UK trucking"
      - "HMRC fuel duty"
      - "UK haulage"

