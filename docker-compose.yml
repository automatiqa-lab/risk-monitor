version: "3.8"

services:
  ops-risk-monitor:
    build: .
    container_name: ops-risk-monitor
    restart: unless-stopped
    ports:
      - "127.0.0.1:8003:8000"
    volumes:
      - ./data:/app/data
      - ./input:/app/input
    environment:
      # Set whichever provider key matches llm.model in config/settings.yaml.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LLM_API_BASE=${LLM_API_BASE:-}
    labels:
      # Adjust the host rule to your own domain before deploying.
      - "traefik.enable=true"
      - "traefik.http.routers.ops-risk-monitor.rule=Host(`your-domain.example`)"
      - "traefik.http.routers.ops-risk-monitor.entrypoints=websecure"
      - "traefik.http.routers.ops-risk-monitor.tls.certresolver=letsencrypt"
      - "traefik.http.services.ops-risk-monitor.loadbalancer.server.port=8000"
    networks:
      - traefik-proxy

networks:
  traefik-proxy:
    external: true
