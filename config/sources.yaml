    type: scrape

  hmm:
    name: "HMM (Hyundai Merchant Marine)"
    news_url: "https://www.hmm21.com/cms/company/engn/introduce/news/index.jsp"
    advisory_url: "https://www.hmm21.com/cms/company/engn/introduce/news/index.jsp"
    type: scrape

  zim:
    name: "ZIM"
    news_url: "https://www.zim.com/news"
    advisory_url: "https://www.zim.com/news"
    type: scrape

