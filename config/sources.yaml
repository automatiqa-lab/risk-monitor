# Data sources for Operations Risk Navigator
#
# Shipping lines are scraped directly via Playwright (when --no-scrape is NOT set).
# All other news is collected via targeted Google News searches - no feed URLs needed.

shipping_lines:
  # ── Top 10 global container carriers ──────────────────────────────────────

  msc:
    name: "MSC"
    news_url: "https://www.msc.com/en/news"
    advisory_url: "https://www.msc.com/en/news"
    type: scrape

  maersk:
    name: "Maersk"
    news_url: "https://www.maersk.com/news"
    advisory_url: "https://www.maersk.com/news/service-updates"
    type: scrape

  cma_cgm:
    name: "CMA CGM"
    news_url: "https://www.cma-cgm.com/news"
    advisory_url: "https://www.cma-cgm.com/news"
    type: scrape

  hapag_lloyd:
    name: "Hapag-Lloyd"
    news_url: "https://www.hapag-lloyd.com/en/news-insights/news.html"
    advisory_url: "https://www.hapag-lloyd.com/en/news-insights/customer-advisories.html"
    type: scrape

  cosco:
    name: "COSCO Shipping"
    news_url: "https://lines.coscoshipping.com/home/Notices"
    advisory_url: "https://lines.coscoshipping.com/home/Notices"
