  wan_hai:
    name: "Wan Hai Lines"
    news_url: "https://www.wanhai.com/views/Main.xhtml"
    advisory_url: "https://www.wanhai.com/views/Main.xhtml"
    type: scrape

  pil:
    name: "Pacific International Lines (PIL)"
    news_url: "https://www.pilship.com/en-news/"
    advisory_url: "https://www.pilship.com/en-news/"
    type: scrape

  tslines:
    name: "TS Lines"
    news_url: "https://www.tslines.com/en/news"
    advisory_url: "https://www.tslines.com/en/news"
    type: scrape

  emirates_shipping:
    name: "Emirates Shipping Line"
    news_url: "https://www.emiratesline.com/news/"
